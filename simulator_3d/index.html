<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Planets 3D</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <div id="app">
      <aside class="panel panel-expanded" aria-label="Simulation controls">
        <div class="panel-primary">
          <div class="controls">
            <button id="toggle-run" type="button">Start</button>
            <button id="toggle-panel" class="panel-toggle" type="button" aria-label="Hide controls" title="Hide controls">‹</button>
          </div>

          <label class="field">
            <span>Scenario</span>
            <select id="scenario-select"></select>
          </label>

          <div class="primary-playback">
            <label class="field field-range playback-scale">
              <span class="timescale-heading">Timescale: <input id="time-scale-num" type="number" inputmode="decimal" min="0.1" max="10000" step="any" value="1" /></span>
              <span class="range-row">
                <span class="range-col">
                  <input id="time-scale" type="range" min="0" max="1000" value="200" list="ts-ticks" />
                  <datalist id="ts-ticks">
                    <option value="0"></option>
                    <option value="200"></option>
                    <option value="400"></option>
                    <option value="600"></option>
                    <option value="800"></option>
                    <option value="1000"></option>
                  </datalist>
                  <div class="range-labels">
                    <span style="left:0%">0.1</span>
                    <span style="left:20%">1</span>
                    <span style="left:40%">10</span>
                    <span style="left:60%">100</span>
                    <span style="left:80%">1k</span>
                    <span style="left:100%">10k</span>
                  </div>
                </span>
              </span>
            </label>

            <div class="camera-status-row">
              <label class="field camera-field">
                <span>Camera</span>
                <select id="camera-target">
                  <option value="free">Free</option>
                  <option value="rocket">Rocket</option>
                  <option value="earth">Earth</option>
                  <option value="jupiter">Jupiter</option>
                  <option value="sun">Sun</option>
                </select>
              </label>

              <dl class="compact-readout" aria-label="Compact simulation status">
                <div>
                  <dt>Time</dt>
                  <dd id="compact-mission-time">0s</dd>
                </div>
                <div>
                  <dt>Speed</dt>
                  <dd id="compact-rocket-speed">not launched</dd>
                </div>
              </dl>
            </div>
          </div>
        </div>

        <details class="advanced" open>
          <summary>Advanced</summary>

          <div class="advanced-body">
            <label class="check">
              <input id="dynamic-time-scale" type="checkbox" checked />
              <span>Auto speed</span>
            </label>

            <label class="check">
              <input id="show-trails" type="checkbox" checked />
              <span>Trails</span>
            </label>

            <dl class="readout">
              <div>
                <dt>Time</dt>
                <dd id="time-readout">0s</dd>
              </div>
              <div>
                <dt id="rocket-speed-label" title="Speed relative to the nearest dominant body (Earth near launch, Sun in interplanetary space)">Speed</dt>
                <dd id="rocket-speed">not launched</dd>
              </div>
              <div>
                <dt id="target-distance-label">Target</dt>
                <dd id="target-distance">—</dd>
              </div>
              <div>
                <dt id="speed-to-target-label">Speed to target</dt>
                <dd id="speed-to-target">—</dd>
              </div>
              <div>
                <dt>Mission time</dt>
                <dd id="mission-time">n/a</dd>
              </div>
              <div>
                <dt>Program</dt>
                <dd id="flight-phase">n/a</dd>
              </div>
              <div>
                <dt>Next burn</dt>
                <dd id="next-burn-readout">n/a</dd>
              </div>
              <div>
                <dt>Throttle</dt>
                <dd id="throttle-readout">n/a</dd>
              </div>
              <div>
                <dt>Fuel</dt>
                <dd id="fuel-readout">n/a</dd>
              </div>
              <div>
                <dt>Inclination</dt>
                <dd id="orbit-inclination">n/a</dd>
              </div>
            </dl>
          </div>
        </details>

      </aside>

      <main class="viewport">
        <canvas id="scene"></canvas>
      </main>
    </div>

    <script src="./vendor/satellite.js"></script>
    <script src="./vendor/three.min.js"></script>
    <script src="./vendor/OrbitControls.js"></script>
    <script type="module" src="./src/app-classic.js"></script>
  </body>
</html>
