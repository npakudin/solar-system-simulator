<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Solar System 3D</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <div id="app">
      <aside class="panel" aria-label="Simulation controls">
        <div class="title">
          <span>Solar System 3D</span>
          <strong>Gravity assist</strong>
        </div>

        <div class="controls">
          <button id="toggle-run" type="button">Start</button>
          <button id="launch-rocket" type="button">Launch</button>
          <button id="reset-sim" type="button">Reset</button>
        </div>

        <label class="field">
          <span>Scenario</span>
          <select id="scenario-select"></select>
        </label>

        <label class="field">
          <span>Launch site</span>
          <select id="launch-site-select"></select>
        </label>

        <label class="field">
          <span>Target</span>
          <select id="target-profile-select"></select>
        </label>

        <label class="field">
          <span>Camera</span>
          <select id="camera-target">
            <option value="free">Free</option>
            <option value="rocket">Rocket</option>
            <option value="earth">Earth</option>
            <option value="jupiter">Jupiter</option>
            <option value="sun">Sun</option>
          </select>
        </label>

        <label class="field field-range">
          <span>Time scale</span>
          <span class="range-row">
            <input id="time-scale" type="range" min="1" max="400" value="80" />
            <input id="time-scale-num" type="number" min="1" max="400" value="80" />
          </span>
        </label>

        <label class="check">
          <input id="show-trails" type="checkbox" checked />
          <span>Trails</span>
        </label>

        <dl class="readout">
          <div>
            <dt>Time</dt>
            <dd id="time-readout">0.00 years</dd>
          </div>
          <div>
            <dt>Rocket speed</dt>
            <dd id="rocket-speed">not launched</dd>
          </div>
          <div>
            <dt>Jupiter distance</dt>
            <dd id="jupiter-distance">not launched</dd>
          </div>
          <div>
            <dt>Mission time</dt>
            <dd id="mission-time">n/a</dd>
          </div>
          <div>
            <dt>Program</dt>
            <dd id="flight-phase">n/a</dd>
          </div>
          <div>
            <dt>Next burn</dt>
            <dd id="next-burn-readout">n/a</dd>
          </div>
          <div>
            <dt>Throttle</dt>
            <dd id="throttle-readout">n/a</dd>
          </div>
          <div>
            <dt>Fuel</dt>
            <dd id="fuel-readout">n/a</dd>
          </div>
          <div>
            <dt>Rocket mass</dt>
            <dd id="rocket-mass-readout">n/a</dd>
          </div>
          <div>
            <dt>Mass flow</dt>
            <dd id="mass-flow-readout">n/a</dd>
          </div>
          <div>
            <dt>Inclination</dt>
            <dd id="orbit-inclination">n/a</dd>
          </div>
        </dl>
      </aside>

      <main class="viewport">
        <canvas id="scene"></canvas>
      </main>
    </div>

    <script src="./vendor/satellite.js"></script>
    <script src="./vendor/three.min.js"></script>
    <script src="./vendor/OrbitControls.js"></script>
    <script src="./src/scenario-data.js"></script>
    <script src="./missions/baikonur-demo.js"></script>
    <script src="./src/physics-classic.js"></script>
    <script src="./src/rocket-classic.js"></script>
    <script src="./src/app-classic.js"></script>
  </body>
</html>
